<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoDrop — Logs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--card:#0c0c0f;--card-hover:rgba(255,255,255,0.02);
  --border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.12);
  --fg:#fafafa;--fg-muted:#71717a;--fg-dim:#a1a1aa;
  --muted-bg:rgba(255,255,255,0.04);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.1);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.1);
  --yellow:#eab308;--yellow-bg:rgba(234,179,8,0.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.1);
  --primary:#818cf8;--primary-bg:rgba(129,140,248,0.1);
  --radius:6px;
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--fg);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card)}
.tab{padding:12px 24px;font-size:.875rem;font-weight:500;color:var(--fg-muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .15s}
.tab:hover{color:var(--fg-dim)}
.tab.active{color:var(--fg);border-bottom-color:var(--primary)}
.tab-panel{display:none;flex:1;overflow:hidden;flex-direction:column}
.tab-panel.active{display:flex}

/* ── Header ── */
.panel-header{padding:20px 24px;border-bottom:1px solid var(--border);background:var(--card)}
.panel-header h1{font-size:1.25rem;font-weight:600;margin-bottom:2px}
.panel-header .subtitle{font-size:.8rem;color:var(--fg-muted)}
.header-controls{display:flex;gap:8px;margin-top:12px}
.search-box{position:relative;flex:1}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--fg-muted);pointer-events:none}
.search-box input{width:100%;height:36px;padding:0 12px 0 34px;font-size:.8rem;background:var(--muted-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--fg);outline:none;font-family:inherit}
.search-box input::placeholder{color:var(--fg-muted)}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-bg)}
.btn-filter{display:flex;align-items:center;gap:6px;height:36px;padding:0 14px;font-size:.8rem;font-weight:500;border:1px solid var(--border);border-radius:var(--radius);background:var(--muted-bg);color:var(--fg-dim);cursor:pointer;position:relative;transition:all .15s}
.btn-filter:hover{border-color:var(--border-hover);color:var(--fg)}
.btn-filter.active{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-filter svg{width:16px;height:16px}
.filter-count{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--red);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ── Content area with sidebar ── */
.content-area{flex:1;display:flex;overflow:hidden}

/* ── Filter Sidebar ── */
.filter-sidebar{width:0;overflow:hidden;border-right:1px solid var(--border);background:var(--card);transition:width .2s ease}
.filter-sidebar.open{width:260px}
.filter-sidebar-inner{width:260px;padding:16px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;height:100%}
.filter-group-title{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-muted);margin-bottom:8px}
.filter-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:8px 12px;font-size:.8rem;border:1px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--fg-muted);cursor:pointer;transition:all .15s;margin-bottom:6px;font-family:inherit}
.filter-btn:hover{border-color:rgba(129,140,248,0.4);background:var(--muted-bg);transform:translateX(2px)}
.filter-btn.selected{border-color:var(--primary);background:var(--primary-bg);color:var(--primary)}
.filter-btn .check{display:none;width:14px;height:14px}
.filter-btn.selected .check{display:block}
.filter-clear{font-size:.75rem;color:var(--fg-muted);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px}
.filter-clear:hover{color:var(--fg);background:var(--muted-bg)}
.filter-header{display:flex;align-items:center;justify-content:space-between}
.filter-header h3{font-size:.85rem;font-weight:600}

/* ── Log rows ── */
.log-list{flex:1;overflow-y:auto;overflow-x:hidden}
.log-list::-webkit-scrollbar{width:6px}
.log-list::-webkit-scrollbar-track{background:transparent}
.log-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.log-row{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.log-row:hover{background:var(--card-hover)}
.log-row .chevron{flex-shrink:0;width:16px;height:16px;color:var(--fg-muted);transition:transform .2s}
.log-row.expanded .chevron{transform:rotate(180deg)}

/* Badge */
.badge{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:.7rem;font-weight:500;text-transform:capitalize;flex-shrink:0}
.badge-info{background:var(--blue-bg);color:var(--blue)}
.badge-success{background:var(--green-bg);color:var(--green)}
.badge-warning{background:var(--yellow-bg);color:var(--yellow)}
.badge-error{background:var(--red-bg);color:var(--red)}
.badge-outline{background:transparent;border:1px solid var(--border);color:var(--fg-dim);font-size:.65rem}

/* Row cells */
.cell-time{width:64px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--fg-muted)}
.cell-method{flex-shrink:0;font-size:.8rem;font-weight:500;min-width:40px}
.cell-path{flex:1;font-size:.8rem;color:var(--fg-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell-status{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:600}
.cell-status.s2{color:var(--green)}.cell-status.s3{color:var(--blue)}.cell-status.s4{color:var(--yellow)}.cell-status.s5{color:var(--red)}
.cell-ms{width:56px;flex-shrink:0;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--fg-muted)}
.cell-ip{flex-shrink:0;font-size:.75rem;color:var(--fg-muted);font-family:'JetBrains Mono',monospace}
.cell-country{flex-shrink:0;font-size:.75rem;color:var(--fg-dim);min-width:48px}

/* Expanded detail */
.log-detail{display:none;border-bottom:1px solid var(--border);background:var(--muted-bg);padding:16px 24px 16px 52px;animation:slideDown .2s ease}
.log-detail.open{display:block}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:300px}}
.detail-section{margin-bottom:12px}
.detail-label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--fg-muted);margin-bottom:4px}
.detail-value{font-family:'JetBrains Mono',monospace;font-size:.8rem;background:var(--bg);padding:8px 12px;border-radius:var(--radius);color:var(--fg)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}

/* ── Visitors tab ── */
.visitor-row{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.visitor-row:hover{background:var(--card-hover)}
.visitor-row .chevron{flex-shrink:0;width:16px;height:16px;color:var(--fg-muted);transition:transform .2s}
.visitor-row.expanded .chevron{transform:rotate(180deg)}
.v-ip{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--fg-dim);min-width:110px}
.v-country{flex-shrink:0;font-size:.8rem;color:var(--fg-dim);min-width:80px}
.v-device{flex-shrink:0;font-size:.8rem;color:var(--fg-muted)}
.v-browser{flex-shrink:0;font-size:.8rem;color:var(--fg-muted);min-width:60px}
.v-visits{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:600;color:var(--primary);min-width:30px;text-align:center}
.v-ref{flex:1;font-size:.8rem;color:var(--fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.v-ref.direct{color:var(--fg-muted);font-style:italic}
.v-time{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--fg-muted)}

.visitor-detail{display:none;border-bottom:1px solid var(--border);background:var(--muted-bg);padding:16px 24px 16px 52px;animation:slideDown .2s ease}
.visitor-detail.open{display:block}

/* ── Stats counters ── */
.stats-bar{display:flex;gap:16px;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--card);flex-wrap:wrap}
.stat-chip{display:flex;align-items:center;gap:6px;font-size:.8rem;color:var(--fg-dim)}
.stat-chip .num{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--fg)}

/* ── Empty state ── */
.empty-state{display:flex;align-items:center;justify-content:center;height:200px;color:var(--fg-muted);font-size:.9rem}

/* ── Connection dot ── */
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.conn-dot.off{background:var(--red)}
</style>
</head>
<body>

<!-- ── Tabs ── -->
<div class="tabs">
  <button class="tab active" data-tab="logs">Logs</button>
  <button class="tab" data-tab="visitors">Visitors</button>
</div>

<!-- ══════════ LOGS TAB ══════════ -->
<div class="tab-panel active" id="tab-logs">
  <div class="panel-header">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="conn-dot live" id="connDot"></div>
      <div>
        <h1>Logs</h1>
        <p class="subtitle"><span id="logCount">0</span> of <span id="logTotal">0</span> logs</p>
      </div>
    </div>
    <div class="header-controls">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="logSearch" placeholder="Search logs by path, IP, or country...">
      </div>
      <button class="btn-filter" id="filterToggle" onclick="toggleFilters()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
        <span id="filterCountBadge" class="filter-count" style="display:none">0</span>
      </button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-chip">Total <span class="num" id="cntTotal">0</span></div>
    <div class="stat-chip" style="color:var(--green)">2xx <span class="num" id="cnt2">0</span></div>
    <div class="stat-chip" style="color:var(--blue)">3xx <span class="num" id="cnt3">0</span></div>
    <div class="stat-chip" style="color:var(--yellow)">4xx <span class="num" id="cnt4">0</span></div>
    <div class="stat-chip" style="color:var(--red)">5xx <span class="num" id="cnt5">0</span></div>
  </div>

  <div class="content-area">
    <div class="filter-sidebar" id="filterSidebar">
      <div class="filter-sidebar-inner">
        <div class="filter-header">
          <h3>Filters</h3>
          <button class="filter-clear" onclick="clearAllFilters()">Clear</button>
        </div>

        <div>
          <div class="filter-group-title">Method</div>
          <div id="filterMethods"></div>
        </div>
        <div>
          <div class="filter-group-title">Status</div>
          <div id="filterStatuses"></div>
        </div>
        <div>
          <div class="filter-group-title">Country</div>
          <div id="filterCountries"></div>
        </div>
      </div>
    </div>
    <div class="log-list" id="logList"></div>
  </div>
</div>

<!-- ══════════ VISITORS TAB ══════════ -->
<div class="tab-panel" id="tab-visitors">
  <div class="panel-header">
    <h1>Visitors</h1>
    <p class="subtitle">Real visitors from nginx access log</p>
    <div class="header-controls">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="visitorSearch" placeholder="Search by IP, country, or referrer...">
      </div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stat-chip">Total visitors <span class="num" id="visitorTotal">0</span></div>
  </div>
  <div class="log-list" id="visitorList"></div>
</div>

<script>
// ── Tab switching ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'visitors' && visitors.length === 0) loadVisitors();
  });
});

// ── Timezone helper ──
function toTurkeyTime(utcStr) {
  if (!utcStr) return '—';
  try {
    let d;
    if (utcStr.includes('T')) d = new Date(utcStr);
    else if (utcStr.length <= 8) { const now = new Date(); d = new Date(`${now.toISOString().slice(0,10)}T${utcStr}Z`); }
    else d = new Date(utcStr.replace(' ', 'T') + 'Z');
    return d.toLocaleTimeString('en-GB', { timeZone: 'Europe/Istanbul', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return utcStr; }
}

// ══════════════════════════════════════════════════════
// LOGS
// ══════════════════════════════════════════════════════
const allRows = [];
let filteredRows = [];
let expandedLogId = null;
const counts = { total: 0, s2: 0, s3: 0, s4: 0, s5: 0 };
const activeFilters = { method: [], status: [], country: [] };
const knownMethods = new Set();
const knownStatuses = new Set();
const knownCountries = new Set();
let logIdCounter = 0;

function statusClass(s) {
  if (s >= 200 && s < 300) return 's2';
  if (s >= 300 && s < 400) return 's3';
  if (s >= 400 && s < 500) return 's4';
  if (s >= 500) return 's5';
  return '';
}

function badgeClass(method) {
  if (method === 'GET') return 'badge-info';
  if (method === 'POST') return 'badge-success';
  if (method === 'PUT' || method === 'PATCH') return 'badge-warning';
  if (method === 'DELETE') return 'badge-error';
  return 'badge-info';
}

function addRow(data) {
  const row = { ...data, _id: ++logIdCounter };
  allRows.unshift(row);
  if (allRows.length > 2000) allRows.pop();

  const sc = statusClass(row.status);
  counts.total++;
  if (sc === 's2') counts.s2++;
  else if (sc === 's3') counts.s3++;
  else if (sc === 's4') counts.s4++;
  else if (sc === 's5') counts.s5++;

  knownMethods.add(row.method);
  knownStatuses.add(String(row.status));
  if (row.country) knownCountries.add(row.country);

  updateCounters();
  applyFilters();
}

function updateCounters() {
  document.getElementById('cntTotal').textContent = counts.total;
  document.getElementById('cnt2').textContent = counts.s2;
  document.getElementById('cnt3').textContent = counts.s3;
  document.getElementById('cnt4').textContent = counts.s4;
  document.getElementById('cnt5').textContent = counts.s5;
}

function applyFilters() {
  const q = (document.getElementById('logSearch').value || '').toLowerCase();
  filteredRows = allRows.filter(r => {
    if (activeFilters.method.length && !activeFilters.method.includes(r.method)) return false;
    if (activeFilters.status.length && !activeFilters.status.includes(String(r.status))) return false;
    if (activeFilters.country.length && !activeFilters.country.includes(r.country || '')) return false;
    if (q) {
      const hay = `${r.path} ${r.ip} ${r.country} ${r.method} ${r.status}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  document.getElementById('logCount').textContent = filteredRows.length;
  document.getElementById('logTotal').textContent = allRows.length;
  renderLogs();
}

function renderLogs() {
  const list = document.getElementById('logList');
  const frag = document.createDocumentFragment();

  filteredRows.slice(0, 500).forEach(r => {
    const sc = statusClass(r.status);
    const time = toTurkeyTime(r.ts || r.time || '');
    const isExpanded = expandedLogId === r._id;

    const row = document.createElement('div');
    row.className = 'log-row' + (isExpanded ? ' expanded' : '');
    row.onclick = () => { expandedLogId = expandedLogId === r._id ? null : r._id; renderLogs(); };
    row.innerHTML = `
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      <span class="badge ${badgeClass(r.method)}">${r.method}</span>
      <span class="cell-time">${time}</span>
      <span class="cell-country">${r.country || '—'}</span>
      <span class="cell-path">${r.path}</span>
      <span class="cell-status ${sc}">${r.status}</span>
      <span class="cell-ms">${r.ms != null ? r.ms + 'ms' : '—'}</span>
    `;
    frag.appendChild(row);

    if (isExpanded) {
      const detail = document.createElement('div');
      detail.className = 'log-detail open';
      const tags = [];
      if (r.platform) tags.push(r.platform);
      if (r.quality) tags.push(r.quality);
      if (r.dl_url) tags.push('download');
      detail.innerHTML = `
        <div class="detail-section">
          <div class="detail-label">Request</div>
          <div class="detail-value">${r.method} ${r.path}</div>
        </div>
        <div class="detail-grid">
          <div class="detail-section">
            <div class="detail-label">IP</div>
            <div class="detail-value">${r.ip}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Country</div>
            <div class="detail-value">${r.country || '—'}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Duration</div>
            <div class="detail-value">${r.ms != null ? r.ms + 'ms' : '—'}</div>
          </div>
        </div>
        ${tags.length ? `<div class="detail-section"><div class="detail-label">Tags</div><div class="detail-tags">${tags.map(t => `<span class="badge badge-outline">${t}</span>`).join('')}</div></div>` : ''}
        ${r.dl_url ? `<div class="detail-section"><div class="detail-label">URL</div><div class="detail-value" style="word-break:break-all;font-size:.7rem">${r.dl_url}</div></div>` : ''}
      `;
      frag.appendChild(detail);
    }
  });

  list.innerHTML = '';
  if (frag.children.length === 0) {
    list.innerHTML = '<div class="empty-state">No logs match your filters.</div>';
  } else {
    list.appendChild(frag);
  }
}

// ── Filter sidebar ──
function toggleFilters() {
  const sb = document.getElementById('filterSidebar');
  const btn = document.getElementById('filterToggle');
  sb.classList.toggle('open');
  btn.classList.toggle('active');
  renderFilterButtons();
}

function renderFilterButtons() {
  renderFilterGroup('filterMethods', [...knownMethods].sort(), 'method');
  renderFilterGroup('filterStatuses', [...knownStatuses].sort(), 'status');
  renderFilterGroup('filterCountries', [...knownCountries].sort(), 'country');
  updateFilterCount();
}

function renderFilterGroup(containerId, items, category) {
  const c = document.getElementById(containerId);
  c.innerHTML = items.map(item => {
    const sel = activeFilters[category].includes(item) ? ' selected' : '';
    return `<button class="filter-btn${sel}" onclick="toggleFilter('${category}','${item.replace(/'/g,"\\'")}')">
      <span>${item}</span>
      <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
    </button>`;
  }).join('');
}

function toggleFilter(cat, val) {
  const arr = activeFilters[cat];
  const idx = arr.indexOf(val);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(val);
  renderFilterButtons();
  applyFilters();
}

function clearAllFilters() {
  activeFilters.method = [];
  activeFilters.status = [];
  activeFilters.country = [];
  renderFilterButtons();
  applyFilters();
}

function updateFilterCount() {
  const total = activeFilters.method.length + activeFilters.status.length + activeFilters.country.length;
  const badge = document.getElementById('filterCountBadge');
  if (total > 0) { badge.textContent = total; badge.style.display = 'flex'; }
  else { badge.style.display = 'none'; }
}

document.getElementById('logSearch').addEventListener('input', () => applyFilters());

// ── SSE connection ──
function connect() {
  const dot = document.getElementById('connDot');
  const es = new EventSource('/admin/live');
  es.onopen = () => { dot.className = 'conn-dot live'; };
  es.onerror = () => {
    dot.className = 'conn-dot off';
    es.close();
    setTimeout(connect, 3000);
  };
  es.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if (d.ping) return;
      addRow({
        ts: d.ts, ip: d.ip, country: d.country || '',
        method: d.method, path: d.path,
        status: d.status, ms: d.ms,
        platform: d.platform || '', quality: d.quality || '',
        dl_url: d.dl_url || '',
      });
    } catch {}
  };
}

// ── Load history ──
async function loadHistory() {
  try {
    const res = await fetch('/admin/history');
    if (!res.ok) return;
    const entries = await res.json();
    entries.forEach(e => {
      const row = {
        ts: e.ts || '', time: e.ts || '',
        ip: e.ip || '—', country: '',
        method: 'POST', path: '/fetch',
        status: e.status === 'started' ? 200 : 400,
        ms: null, dl_url: e.url || '',
        platform: e.platform || '', quality: e.quality || '',
      };
      allRows.push(row);
      row._id = ++logIdCounter;
      const sc = statusClass(row.status);
      counts.total++;
      if (sc === 's2') counts.s2++;
      else if (sc === 's4') counts.s4++;
      knownMethods.add(row.method);
      knownStatuses.add(String(row.status));
    });
    updateCounters();
    applyFilters();
  } catch {}
}

// ══════════════════════════════════════════════════════
// VISITORS
// ══════════════════════════════════════════════════════
let visitors = [];
let expandedVisitorIp = null;

async function loadVisitors() {
  try {
    const res = await fetch('/admin/visitors');
    if (!res.ok) return;
    visitors = await res.json();
    document.getElementById('visitorTotal').textContent = visitors.length;
    renderVisitors();
  } catch {}
}

function renderVisitors() {
  const q = (document.getElementById('visitorSearch').value || '').toLowerCase();
  const filtered = visitors.filter(v => {
    if (!q) return true;
    return `${v.ip} ${v.country} ${v.referrer} ${v.browser} ${v.device}`.toLowerCase().includes(q);
  });

  const list = document.getElementById('visitorList');
  const frag = document.createDocumentFragment();

  filtered.forEach(v => {
    const isExp = expandedVisitorIp === v.ip;
    const ref = v.referrer || 'Direct';
    const refClass = v.referrer ? '' : ' direct';
    const time = toTurkeyTime(v.last_seen || '');

    const row = document.createElement('div');
    row.className = 'visitor-row' + (isExp ? ' expanded' : '');
    row.onclick = () => { expandedVisitorIp = expandedVisitorIp === v.ip ? null : v.ip; renderVisitors(); };
    row.innerHTML = `
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
      <span class="v-ip">${v.ip}</span>
      <span class="v-country">${v.country || '—'}</span>
      <span class="v-device">${v.device || '—'}</span>
      <span class="v-browser">${v.browser || '—'}</span>
      <span class="v-visits">${v.visits || 1}</span>
      <span class="v-ref${refClass}" title="${v.referrer || ''}">${ref === 'Direct' ? 'Direct' : ref.replace(/^https?:\/\/(www\.)?/, '').slice(0, 40)}</span>
      <span class="v-time">${time}</span>
    `;
    frag.appendChild(row);

    if (isExp) {
      const detail = document.createElement('div');
      detail.className = 'visitor-detail open';
      const pages = (v.pages_visited || []).map(p => `<span class="badge badge-outline">${p}</span>`).join('');
      detail.innerHTML = `
        <div class="detail-grid">
          <div class="detail-section">
            <div class="detail-label">IP</div>
            <div class="detail-value">${v.ip}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Country</div>
            <div class="detail-value">${v.country || '—'}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Device</div>
            <div class="detail-value">${v.device} / ${v.browser}</div>
          </div>
        </div>
        <div class="detail-grid" style="margin-top:12px">
          <div class="detail-section">
            <div class="detail-label">First seen</div>
            <div class="detail-value">${toTurkeyTime(v.first_seen || '')}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Last seen</div>
            <div class="detail-value">${toTurkeyTime(v.last_seen || '')}</div>
          </div>
          <div class="detail-section">
            <div class="detail-label">Total visits</div>
            <div class="detail-value">${v.visits}</div>
          </div>
        </div>
        ${v.referrer ? `<div class="detail-section" style="margin-top:12px"><div class="detail-label">Referrer</div><div class="detail-value" style="word-break:break-all;font-size:.7rem">${v.referrer}</div></div>` : ''}
        ${pages ? `<div class="detail-section" style="margin-top:12px"><div class="detail-label">Pages visited</div><div class="detail-tags">${pages}</div></div>` : ''}
        ${v.ua ? `<div class="detail-section" style="margin-top:12px"><div class="detail-label">User Agent</div><div class="detail-value" style="font-size:.65rem;word-break:break-all">${v.ua}</div></div>` : ''}
      `;
      frag.appendChild(detail);
    }
  });

  list.innerHTML = '';
  if (frag.children.length === 0) {
    list.innerHTML = '<div class="empty-state">No visitors found.</div>';
  } else {
    list.appendChild(frag);
  }
}

document.getElementById('visitorSearch').addEventListener('input', () => renderVisitors());

// ── Init ──
loadHistory();
connect();
</script>
